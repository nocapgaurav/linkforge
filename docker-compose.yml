services:
  postgres:
    image: postgres:17-alpine
    container_name: linkforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkforge
      POSTGRES_PASSWORD: linkforge
      POSTGRES_DB: linkforge
    ports:
      - '5432:5432'
    volumes:
      - linkforge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U linkforge -d linkforge']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  linkforge_pgdata:
